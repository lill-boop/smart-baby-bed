node {
  name = "emqx@127.0.0.1"
  cookie = "emqxsecretcookie"
  data_dir = "data"
}

cluster {
  name = emqxcl
  discovery_strategy = manual
}

dashboard {
  listeners.http {
    bind = "0.0.0.0:18083"
  }
}

listeners.tcp.default {
  bind = "192.168.0.222:1884"
  max_connections = 1024000
}

authorization {
  no_match = allow
  cache = { enable = true }
}

mqtt {
  max_packet_size = 1MB
}
